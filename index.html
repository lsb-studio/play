<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연주 기록</title>
<meta name="description" content="연주 기록">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --surface:#12121a;
  --surface2:#1a1a28;
  --border:#ffffff0a;
  --text:#e8e6f0;
  --text2:#9896a8;
  --accent:#a78bfa;
  --accent2:#7c3aed;
  --accent-glow:#a78bfa22;
  --radius:16px;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'Inter','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* Header */
header{
  text-align:center;padding:3rem 1.5rem 2rem;
  position:relative;overflow:hidden;
}
header::before{
  content:'';position:absolute;top:-60%;left:50%;transform:translateX(-50%);
  width:600px;height:600px;
  background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);
  pointer-events:none;
}
header h1{
  font-size:1.5rem;font-weight:300;letter-spacing:.15em;
  color:var(--text2);text-transform:uppercase;position:relative;
}
header h1 span{color:var(--accent);font-weight:500}
header p{font-size:.85rem;color:var(--text2);margin-top:.5rem;position:relative;opacity:.6}

/* Main */
main{max-width:640px;margin:0 auto;padding:0 1rem 6rem}

/* Date Section */
.date-section{margin-bottom:2rem}
.date-header{
  display:flex;align-items:center;gap:.75rem;
  padding:.75rem 0;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.date-header:hover .date-label{color:var(--accent)}
.date-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);flex-shrink:0;
  box-shadow:0 0 8px var(--accent-glow);
}
.date-label{
  font-size:1.1rem;font-weight:500;
  transition:color .2s;flex:1;
}
.date-count{
  font-size:.75rem;color:var(--text2);
  background:var(--surface2);padding:.2rem .6rem;
  border-radius:20px;
}
.date-chevron{
  width:20px;height:20px;color:var(--text2);
  transition:transform .3s ease;flex-shrink:0;
}
.date-section.collapsed .date-chevron{transform:rotate(-90deg)}
.date-section.collapsed .track-list{
  max-height:0;opacity:0;pointer-events:none;
}

/* Track List */
.track-list{
  display:flex;flex-direction:column;gap:2px;
  margin-left:4px;border-left:1px solid var(--border);
  padding-left:1.25rem;
  max-height:2000px;opacity:1;
  transition:max-height .4s ease,opacity .3s ease;
  overflow:hidden;
}
.track{
  display:flex;align-items:center;gap:.75rem;
  padding:.7rem .85rem;border-radius:12px;
  cursor:pointer;transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.track:hover{background:var(--surface2)}
.track.active{background:var(--accent2)18;border:1px solid var(--accent)22}
.track-num{
  font-size:.7rem;color:var(--text2);font-weight:500;
  min-width:1.5rem;text-align:center;
  font-variant-numeric:tabular-nums;
}
.track-title{flex:1;font-size:.9rem;font-weight:400}
.track-dur{font-size:.75rem;color:var(--text2);font-variant-numeric:tabular-nums}

/* Sticky Player */
#player-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  z-index:100;
  padding:env(safe-area-inset-bottom,0);
}
#player-bar.visible{transform:translateY(0)}
.player-inner{max-width:640px;margin:0 auto;padding:.75rem 1rem}
.player-info{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.player-date{font-size:.7rem;color:var(--accent);font-weight:500}
.player-title{font-size:.85rem;font-weight:400;flex:1}
.player-close{
  background:none;border:none;color:var(--text2);cursor:pointer;
  padding:4px;border-radius:8px;display:flex;
}
.player-close:hover{color:var(--text);background:var(--surface2)}

/* Progress */
.progress-wrap{
  width:100%;height:20px;display:flex;align-items:center;
  cursor:pointer;margin-bottom:.35rem;
  -webkit-tap-highlight-color:transparent;
}
.progress-bg{
  width:100%;height:3px;background:var(--surface2);
  border-radius:3px;position:relative;overflow:visible;
}
.progress-fill{
  height:100%;background:var(--accent);border-radius:3px;
  width:0%;position:relative;transition:none;
}
.progress-fill::after{
  content:'';position:absolute;right:-5px;top:50%;
  transform:translateY(-50%);width:10px;height:10px;
  border-radius:50%;background:var(--accent);
  opacity:0;transition:opacity .15s;
}
.progress-wrap:hover .progress-fill::after{opacity:1}

/* Controls */
.player-controls{display:flex;align-items:center;gap:.5rem}
.player-time{font-size:.7rem;color:var(--text2);min-width:3rem;font-variant-numeric:tabular-nums}
.player-time.end{text-align:right}
.ctrl-btn{
  background:none;border:none;color:var(--text);
  cursor:pointer;padding:6px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.ctrl-btn:hover{background:var(--surface2)}
.ctrl-btn.play{
  width:40px;height:40px;
  background:var(--accent);border-radius:50%;color:#0a0a0f;
}
.ctrl-btn.play:hover{background:#b49dfc}
.ctrl-spacer{flex:1}
.ctrl-btn svg{width:18px;height:18px}
.ctrl-btn.play svg{width:20px;height:20px}

/* Skip buttons */
.skip-label{font-size:.6rem;color:var(--text2);pointer-events:none}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}

@media(max-width:480px){
  header{padding:2rem 1rem 1.5rem}
  header h1{font-size:1.25rem}
  .track{padding:.6rem .7rem}
}
</style>
</head>
<body>

<header>
  <h1><span></span> 연주 기록</h1>
  <p>Archive</p>
</header>

<main id="app"></main>

<div id="player-bar">
  <div class="player-inner">
    <div class="player-info">
      <span class="player-date" id="p-date"></span>
      <span class="player-title" id="p-title"></span>
      <button class="player-close" onclick="closePlayer()" aria-label="닫기">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="4" x2="14" y2="14"/><line x1="14" y1="4" x2="4" y2="14"/></svg>
      </button>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bg"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="player-controls">
      <span class="player-time" id="p-cur">0:00</span>
      <button class="ctrl-btn" onclick="skip(-10)" aria-label="10초 뒤로">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/><text x="12" y="16" text-anchor="middle" font-size="7" fill="currentColor" stroke="none" font-weight="600">10</text></svg>
      </button>
      <button class="ctrl-btn" onclick="prevTrack()" aria-label="이전 곡">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="5" width="2.5" height="14" rx="1"/><polygon points="20 5 9 12 20 19"/></svg>
      </button>
      <button class="ctrl-btn play" id="btn-play" onclick="togglePlay()" aria-label="재생">
        <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="8 5 20 12 8 19"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="7" y="5" width="3.5" height="14" rx="1"/><rect x="13.5" y="5" width="3.5" height="14" rx="1"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()" aria-label="다음 곡">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="4 5 15 12 4 19"/><rect x="18.5" y="5" width="2.5" height="14" rx="1"/></svg>
      </button>
      <button class="ctrl-btn" onclick="skip(10)" aria-label="10초 앞으로">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/><text x="12" y="16" text-anchor="middle" font-size="7" fill="currentColor" stroke="none" font-weight="600">10</text></svg>
      </button>
      <span class="player-time end" id="p-dur">0:00</span>
    </div>
  </div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
// ── DATA: Add new sessions here ──
const sessions = [
  {
    date: '260430',
    tracks: [
      '01__(2).mp3','02__(2).mp3','03__(2).mp3','04__(2).mp3',
      '05__(2).mp3','06__(2).mp3','07__(2).mp3','08__(2).mp3'
    ]
  },
  {
    date: '260429',
    tracks: [
      '01__.mp3','02__.mp3','03__.mp3','04__.mp3','05__.mp3',
      '06__.mp3','07__.mp3','08__.mp3','09__.mp3','10__.mp3',
      '11__.mp3','12__.mp3','13__.mp3'
    ]
  }
];

function dateLabel(d){
  const y='20'+d.slice(0,2), m=d.slice(2,4), dd=d.slice(4,6);
  const dt=new Date(y,m-1,dd);
  const day=['일','월','화','수','목','금','토'][dt.getDay()];
  return `${y}. ${parseInt(m)}. ${parseInt(dd)}. (${day})`;
}
function trackLabel(f){
  const n=parseInt(f.match(/^(\d+)/)[1]);
  return `Track ${n}`;
}
function fmt(s){
  if(!s||isNaN(s))return'0:00';
  const m=Math.floor(s/60),sec=Math.floor(s%60);
  return m+':'+String(sec).padStart(2,'0');
}

// ── RENDER ──
const app=document.getElementById('app');
sessions.forEach(s=>{
  const sec=document.createElement('div');
  sec.className='date-section';
  sec.innerHTML=`
    <div class="date-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <div class="date-dot"></div>
      <span class="date-label">${dateLabel(s.date)}</span>
      <span class="date-count">${s.tracks.length}곡</span>
      <svg class="date-chevron" viewBox="0 0 20 20" fill="currentColor"><path d="M6 8l4 4 4-4"/></svg>
    </div>
    <div class="track-list">
      ${s.tracks.map((t,i)=>`
        <div class="track" data-date="${s.date}" data-file="${t}" data-idx="${i}" onclick="playTrack('${s.date}','${t}',this)">
          <span class="track-num">${String(i+1).padStart(2,'0')}</span>
          <span class="track-title">${trackLabel(t)}</span>
          <span class="track-dur" id="dur-${s.date}-${i}"></span>
        </div>`).join('')}
    </div>`;
  app.appendChild(sec);
});

// ── AUDIO PLAYER ──
const audio=document.getElementById('audio');
const bar=document.getElementById('player-bar');
const fill=document.getElementById('progress-fill');
let currentEl=null, currentDate='', currentFile='';

function playTrack(date,file,el){
  if(currentEl)currentEl.classList.remove('active');
  currentEl=el;el.classList.add('active');
  currentDate=date;currentFile=file;
  audio.src=`audio/${date}-recording/${file}`;
  audio.play();
  document.getElementById('p-date').textContent=dateLabel(date);
  document.getElementById('p-title').textContent=trackLabel(file);
  bar.classList.add('visible');
  updatePlayIcon();
}

function togglePlay(){
  if(audio.paused)audio.play();else audio.pause();
  updatePlayIcon();
}
function updatePlayIcon(){
  document.getElementById('icon-play').style.display=audio.paused?'':'none';
  document.getElementById('icon-pause').style.display=audio.paused?'none':'';
}
function skip(s){audio.currentTime=Math.max(0,Math.min(audio.duration,audio.currentTime+s))}
function closePlayer(){
  audio.pause();bar.classList.remove('visible');
  if(currentEl)currentEl.classList.remove('active');
  currentEl=null;updatePlayIcon();
}

function adjacentTrack(dir){
  if(!currentEl)return null;
  const all=[...document.querySelectorAll('.track')];
  const idx=all.indexOf(currentEl);
  const next=all[idx+dir];
  return next||null;
}
function nextTrack(){const t=adjacentTrack(1);if(t)t.click()}
function prevTrack(){const t=adjacentTrack(-1);if(t)t.click()}

audio.addEventListener('timeupdate',()=>{
  const pct=audio.duration?(audio.currentTime/audio.duration*100):0;
  fill.style.width=pct+'%';
  document.getElementById('p-cur').textContent=fmt(audio.currentTime);
  document.getElementById('p-dur').textContent=fmt(audio.duration);
});
audio.addEventListener('play',updatePlayIcon);
audio.addEventListener('pause',updatePlayIcon);
audio.addEventListener('ended',()=>{nextTrack()});

// Progress seek
const pw=document.getElementById('progress-wrap');
function seek(e){
  const r=pw.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  audio.currentTime=pct*audio.duration;
}
let dragging=false;
pw.addEventListener('mousedown',e=>{dragging=true;seek(e)});
window.addEventListener('mousemove',e=>{if(dragging)seek(e)});
window.addEventListener('mouseup',()=>{dragging=false});
pw.addEventListener('touchstart',e=>{seek(e.touches[0])},{passive:true});
pw.addEventListener('touchmove',e=>{seek(e.touches[0])},{passive:true});

// Preload durations
sessions.forEach(s=>{
  s.tracks.forEach((t,i)=>{
    const a=new Audio();
    a.preload='metadata';
    a.src=`audio/${s.date}-recording/${t}`;
    a.addEventListener('loadedmetadata',()=>{
      const el=document.getElementById(`dur-${s.date}-${i}`);
      if(el)el.textContent=fmt(a.duration);
    });
  });
});
</script>
</body>
</html>
